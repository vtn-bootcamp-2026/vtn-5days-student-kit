<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="100%" height="100%">
  <defs>
    <!-- Font Import -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
      text {
        font-family: 'JetBrains Mono', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      }
      .label-title {
        fill: #ffffff;
        font-size: 11px;
        font-weight: 600;
        text-anchor: middle;
      }
      .label-sub {
        fill: #94a3b8;
        font-size: 8.5px;
        font-weight: 400;
        text-anchor: middle;
      }
      .arrow-label {
        font-size: 8px;
        font-weight: 500;
      }
    </style>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    
    <!-- Arrowhead Markers -->
    <marker id="arrow-neutral" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- ==================== REGION BOUNDARIES (SWIM LANES) ==================== -->
  
  <!-- Region 1: Pre-processing -->
  <rect x="40" y="85" width="970" height="355" rx="12" fill="none" stroke="rgba(148,163,184,0.15)" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="52" y="105" fill="#94a3b8" font-size="10" font-weight="600">PHÂN KHU 1: TIỀN XỬ LÝ &amp; KIỂM TRA ĐẦU VÀO (PRE-CHECKING)</text>

  <!-- Region 2: AI & PII -->
  <rect x="540" y="455" width="720" height="100" rx="12" fill="none" stroke="rgba(96,165,250,0.15)" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="552" y="475" fill="#60a5fa" font-size="10" font-weight="600">PHÂN KHU 2: TRÍ TUỆ NHÂN TẠO (AI) &amp; BẢO MẬT PII</text>

  <!-- Region 3: Output Routing -->
  <rect x="790" y="575" width="740" height="255" rx="12" fill="none" stroke="rgba(52,211,153,0.15)" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="802" y="595" fill="#34d399" font-size="10" font-weight="600">PHÂN KHU 3: PHÂN PHỐI ĐẦU RA &amp; QUY TRÌNH DUYỆT (HITL)</text>

  <!-- Region 4: Fallback Outputs -->
  <rect x="1040" y="305" width="460" height="100" rx="12" fill="none" stroke="rgba(251,113,133,0.15)" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="1052" y="323" fill="#fb7185" font-size="9" font-weight="600">PHÂN KHU DỰ PHÒNG: LỖI ĐỊNH DẠNG / THẤT BẠI</text>

  <!-- ==================== CONNECTION LINES (Z-order: under boxes) ==================== -->
  
  <!-- A -> B -->
  <line x1="150" y1="145" x2="150" y2="210" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  
  <!-- B -> C -->
  <line x1="150" y1="270" x2="150" y2="330" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  
  <!-- C -> D -->
  <line x1="240" y1="360" x2="320" y2="360" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  
  <!-- D -> E (L-Shape Up) -->
  <path d="M 400 320 L 400 220 L 560 220" fill="none" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-rose)"/>
  <text x="410" y="213" fill="#fb7185" class="arrow-label" text-anchor="start">Empty / Empty spaces (Dữ liệu trống)</text>
  
  <!-- D -> F (Straight) -->
  <line x1="480" y1="360" x2="560" y2="360" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-rose)"/>
  <text x="488" y="353" fill="#fb7185" class="arrow-label" text-anchor="start">Description &lt; 10 chars (Quá ngắn)</text>
  
  <!-- D -> H (L-Shape Down) -->
  <path d="M 400 400 L 400 500 L 560 500" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  <text x="410" y="493" fill="#34d399" class="arrow-label" text-anchor="start">Valid Description (Mô tả hợp lệ)</text>
  
  <!-- E -> G (L-Shape merging) -->
  <path d="M 740 220 L 775 220 L 775 290 L 810 290" fill="none" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-rose)"/>
  
  <!-- F -> G (L-Shape merging) -->
  <path d="M 740 360 L 775 360 L 775 290 L 810 290" fill="none" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-rose)"/>
  
  <!-- H -> I -->
  <line x1="740" y1="500" x2="810" y2="500" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  
  <!-- I -> J -->
  <line x1="990" y1="500" x2="1060" y2="500" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  
  <!-- J -> K -->
  <line x1="1240" y1="500" x2="1320" y2="500" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  
  <!-- K -> L -->
  <line x1="1400" y1="540" x2="1400" y2="620" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  <text x="1410" y="583" fill="#34d399" class="arrow-label" text-anchor="start">confidence &gt;= 80 AND human_review == false</text>

  <!-- L -> O -->
  <line x1="1310" y1="650" x2="1240" y2="650" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

  <!-- K -> M (Bypass L) -->
  <path d="M 1480 500 L 1515 500 L 1515 780 L 1490 780" fill="none" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="1525" y="640" fill="#60a5fa" class="arrow-label" text-anchor="start">confidence &lt; 80 OR human_review == true</text>
  <text x="1525" y="652" fill="#60a5fa" class="arrow-label" text-anchor="start">OR category == 'Unknown' (Chờ duyệt)</text>

  <!-- M -> P -->
  <line x1="1310" y1="780" x2="1240" y2="780" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- P -> Q -->
  <line x1="1060" y1="780" x2="990" y2="780" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>

  <!-- K -> N -->
  <line x1="1400" y1="460" x2="1400" y2="380" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-rose)"/>
  <text x="1410" y="425" fill="#fb7185" class="arrow-label" text-anchor="start">LLM output invalid / Parse error</text>

  <!-- N -> R -->
  <line x1="1310" y1="350" x2="1240" y2="350" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-rose)"/>


  <!-- ==================== COMPONENT BOXES (Z-order: top layer) ==================== -->
  
  <!-- Node A: Start Trigger (150, 120) -->
  <rect x="60" y="95" width="180" height="50" rx="25" fill="#0f172a"/>
  <rect x="60" y="95" width="180" height="50" rx="25" fill="rgba(59, 130, 246, 0.2)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="150" y="117" fill="white" font-size="10.5" font-weight="700" text-anchor="middle">Manual/Schedule Trigger</text>
  <text x="150" y="131" fill="#60a5fa" font-size="8.5" text-anchor="middle">Kích hoạt luồng định kỳ / thủ công</text>

  <!-- Node B: Google Sheets (150, 240) -->
  <rect x="60" y="210" width="180" height="60" rx="6" fill="#0f172a"/>
  <rect x="60" y="210" width="180" height="60" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="150" y="236" class="label-title">Read Google Sheets</text>
  <text x="150" y="250" class="label-sub">Đọc dữ liệu sự cố đầu vào</text>

  <!-- Node C: Filter Node (150, 360) -->
  <rect x="60" y="330" width="180" height="60" rx="6" fill="#0f172a"/>
  <rect x="60" y="330" width="180" height="60" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="150" y="356" class="label-title">Filter Node</text>
  <text x="150" y="370" class="label-sub">Lọc workflow_status == 'New'</text>

  <!-- Node D: Pre-checking Rules Decision (400, 360) -->
  <polygon points="400,320 480,360 400,400 320,360" fill="#0f172a"/>
  <polygon points="400,320 480,360 400,400 320,360" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="400" y="358" fill="white" font-size="10" font-weight="700" text-anchor="middle">Pre-checking Rules</text>
  <text x="400" y="371" fill="#fbbf24" font-size="8" text-anchor="middle">Kiểm định nội dung</text>

  <!-- Node E: Assign Missing (650, 220) -->
  <rect x="560" y="190" width="180" height="60" rx="6" fill="#0f172a"/>
  <rect x="560" y="190" width="180" height="60" rx="6" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="650" y="216" class="label-title">Assign: Missing_Data</text>
  <text x="650" y="230" class="label-sub">Gán nhãn thiếu thông tin</text>

  <!-- Node F: Assign Format Err (650, 360) -->
  <rect x="560" y="330" width="180" height="60" rx="6" fill="#0f172a"/>
  <rect x="560" y="330" width="180" height="60" rx="6" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="650" y="356" class="label-title">Assign: Format_Error</text>
  <text x="650" y="370" class="label-sub">Gán nhãn lỗi định dạng</text>

  <!-- Node G: Log execution log fallback (900, 290) -->
  <rect x="810" y="260" width="180" height="60" rx="6" fill="#0f172a"/>
  <rect x="810" y="260" width="180" height="60" rx="6" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="900" y="286" class="label-title">Log to execution_log</text>
  <text x="900" y="300" class="label-sub">Ghi nhận lỗi Fallback vào Sheets</text>

  <!-- Node H: LLM Node Gemini (650, 500) -->
  <rect x="560" y="470" width="180" height="60" rx="6" fill="#0f172a"/>
  <rect x="560" y="470" width="180" height="60" rx="6" fill="rgba(59, 130, 246, 0.25)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="650" y="496" class="label-title">LLM Node: Google Gemini</text>
  <text x="650" y="510" fill="#60a5fa" font-size="8.5" text-anchor="middle">Phân tích &amp; Sinh JSON định dạng</text>

  <!-- Node I: Clean JSON (900, 500) -->
  <rect x="810" y="470" width="180" height="60" rx="6" fill="#0f172a"/>
  <rect x="810" y="470" width="180" height="60" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="900" y="496" class="label-title">Code Node: Clean JSON</text>
  <text x="900" y="510" class="label-sub">Loại bỏ wrapper markdown từ LLM</text>

  <!-- Node J: Mask PII (1150, 500) -->
  <rect x="1060" y="470" width="180" height="60" rx="6" fill="#0f172a"/>
  <rect x="1060" y="470" width="180" height="60" rx="6" fill="rgba(136, 19, 55, 0.3)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="1150" y="496" class="label-title">Code Node: Mask PII</text>
  <text x="1150" y="510" class="label-sub">Che mật khẩu &amp; thông tin nhạy cảm</text>

  <!-- Node K: Switch Node Decision (1400, 500) -->
  <polygon points="1400,460 1480,500 1400,540 1320,500" fill="#0f172a"/>
  <polygon points="1400,460 1480,500 1400,540 1320,500" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="1400" y="496" fill="white" font-size="10" font-weight="700" text-anchor="middle">Switch Node</text>
  <text x="1400" y="508" fill="#fbbf24" font-size="8" text-anchor="middle">Phân loại tin cậy</text>
  <text x="1400" y="519" fill="#94a3b8" font-size="7" text-anchor="middle">&amp; Yêu cầu phê duyệt</text>

  <!-- Node L: Auto Route (1400, 650) -->
  <rect x="1310" y="620" width="180" height="60" rx="6" fill="#0f172a"/>
  <rect x="1310" y="620" width="180" height="60" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="1400" y="646" class="label-title">Auto Route Branch</text>
  <text x="1400" y="660" class="label-sub">Chuyển trực tiếp phòng chuyên môn</text>

  <!-- Node O: Google Sheets Success Cylinder (1150, 650) -->
  <g transform="translate(1060, 620)">
    <rect x="0" y="10" width="180" height="40" rx="2" fill="#0f172a"/>
    <ellipse cx="90" cy="10" rx="90" ry="10" fill="#0f172a"/>
    <ellipse cx="90" cy="50" rx="90" ry="10" fill="#0f172a"/>
    <rect x="0" y="10" width="180" height="40" fill="rgba(76, 29, 149, 0.4)"/>
    <ellipse cx="90" cy="10" rx="90" ry="10" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <ellipse cx="90" cy="50" rx="90" ry="10" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="0" y1="10" x2="0" y2="50" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="180" y1="10" x2="180" y2="50" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="90" y="31" fill="white" font-size="10.5" font-weight="700" text-anchor="middle">Google Sheets</text>
    <text x="90" y="44" fill="#a78bfa" font-size="8.5" text-anchor="middle">execution_log (Success)</text>
  </g>

  <!-- Node M: Human Review Queue (1400, 780) -->
  <rect x="1310" y="750" width="180" height="60" rx="6" fill="#0f172a"/>
  <rect x="1310" y="750" width="180" height="60" rx="6" fill="rgba(59, 130, 246, 0.2)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="1400" y="776" class="label-title">Human Review Queue</text>
  <text x="1400" y="790" class="label-sub">Chuyển sang hàng chờ phê duyệt</text>

  <!-- Node P: Google Sheets Review Queue Cylinder (1150, 780) -->
  <g transform="translate(1060, 750)">
    <rect x="0" y="10" width="180" height="40" rx="2" fill="#0f172a"/>
    <ellipse cx="90" cy="10" rx="90" ry="10" fill="#0f172a"/>
    <ellipse cx="90" cy="50" rx="90" ry="10" fill="#0f172a"/>
    <rect x="0" y="10" width="180" height="40" fill="rgba(76, 29, 149, 0.4)"/>
    <ellipse cx="90" cy="10" rx="90" ry="10" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <ellipse cx="90" cy="50" rx="90" ry="10" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="0" y1="10" x2="0" y2="50" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="180" y1="10" x2="180" y2="50" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="90" y="31" fill="white" font-size="10.5" font-weight="700" text-anchor="middle">Google Sheets</text>
    <text x="90" y="44" fill="#a78bfa" font-size="8.5" text-anchor="middle">review_queue (HITL)</text>
  </g>

  <!-- Node Q: Google Sheets Pending Cylinder (900, 780) -->
  <g transform="translate(810, 750)">
    <rect x="0" y="10" width="180" height="40" rx="2" fill="#0f172a"/>
    <ellipse cx="90" cy="10" rx="90" ry="10" fill="#0f172a"/>
    <ellipse cx="90" cy="50" rx="90" ry="10" fill="#0f172a"/>
    <rect x="0" y="10" width="180" height="40" fill="rgba(76, 29, 149, 0.4)"/>
    <ellipse cx="90" cy="10" rx="90" ry="10" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <ellipse cx="90" cy="50" rx="90" ry="10" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="0" y1="10" x2="0" y2="50" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="180" y1="10" x2="180" y2="50" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="90" y="31" fill="white" font-size="10.5" font-weight="700" text-anchor="middle">Google Sheets</text>
    <text x="90" y="44" fill="#a78bfa" font-size="8.5" text-anchor="middle">execution_log (Pending)</text>
  </g>

  <!-- Node N: Fallback Branch (1400, 350) -->
  <rect x="1310" y="320" width="180" height="60" rx="6" fill="#0f172a"/>
  <rect x="1310" y="320" width="180" height="60" rx="6" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="1400" y="346" class="label-title">Fallback Branch</text>
  <text x="1400" y="360" class="label-sub">Định tuyến lỗi / Khắc phục</text>

  <!-- Node R: Google Sheets Failed Cylinder (1150, 350) -->
  <g transform="translate(1060, 320)">
    <rect x="0" y="10" width="180" height="40" rx="2" fill="#0f172a"/>
    <ellipse cx="90" cy="10" rx="90" ry="10" fill="#0f172a"/>
    <ellipse cx="90" cy="50" rx="90" ry="10" fill="#0f172a"/>
    <rect x="0" y="10" width="180" height="40" fill="rgba(76, 29, 149, 0.4)"/>
    <ellipse cx="90" cy="10" rx="90" ry="10" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <ellipse cx="90" cy="50" rx="90" ry="10" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="0" y1="10" x2="0" y2="50" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="180" y1="10" x2="180" y2="50" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="90" y="31" fill="white" font-size="10.5" font-weight="700" text-anchor="middle">Google Sheets</text>
    <text x="90" y="44" fill="#a78bfa" font-size="8.5" text-anchor="middle">execution_log (Failed)</text>
  </g>

  <!-- ==================== HEADER / TITLE BLOCK ==================== -->
  <g transform="translate(70, 40)">
    <text x="0" y="20" fill="#ffffff" font-size="18" font-weight="700" letter-spacing="0.5">KIẾN TRÚC QUY TRÌNH PHÂN LOẠI SỰ CỐ TỰ ĐỘNG - END TO END</text>
    <text x="0" y="38" fill="#94a3b8" font-size="11" font-weight="400">Hệ thống phân phối phiếu sự cố tự động tích hợp n8n &amp; Trợ lý AI Google Gemini (Human-in-the-Loop)</text>
  </g>

  <!-- ==================== LEGEND ==================== -->
  <g transform="translate(300, 840)">
    <rect x="0" y="0" width="1000" height="40" rx="8" fill="rgba(30, 41, 59, 0.3)" stroke="#1e293b" stroke-width="1"/>
    
    <!-- Item 1 -->
    <rect x="20" y="12" width="16" height="16" rx="4" fill="rgba(59, 130, 246, 0.2)" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="44" y="24" fill="#94a3b8" font-size="9" font-weight="500">Trigger / Khởi đầu</text>
    
    <!-- Item 2 -->
    <rect x="200" y="12" width="16" height="16" rx="4" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
    <text x="224" y="24" fill="#94a3b8" font-size="9" font-weight="500">Node xử lý (Code/Filter)</text>

    <!-- Item 3 -->
    <rect x="420" y="12" width="16" height="16" rx="4" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="444" y="24" fill="#94a3b8" font-size="9" font-weight="500">Lưu trữ (Google Sheets)</text>

    <!-- Item 4 -->
    <polygon points="650,12 658,20 650,28 642,20" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="674" y="24" fill="#94a3b8" font-size="9" font-weight="500">Điều kiện / Rẽ nhánh</text>

    <!-- Item 5 -->
    <rect x="830" y="12" width="16" height="16" rx="4" fill="rgba(59, 130, 246, 0.25)" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="854" y="24" fill="#94a3b8" font-size="9" font-weight="500">Trợ lý AI (Google Gemini)</text>
  </g>
</svg>
